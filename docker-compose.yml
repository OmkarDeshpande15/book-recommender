services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: bookrec-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookrec
      POSTGRES_USER: bookrec
      POSTGRES_PASSWORD: bookrec
    volumes:
      - bookrec-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookrec -d bookrec"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - bookrec-net
    # ports:
    #   - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookrec-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bookrec:bookrec@db:5432/bookrec
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookrec-net
    # ports:
    #   - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookrec-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - bookrec-net

networks:
  bookrec-net:
    driver: bridge

volumes:
  bookrec-db-data:
