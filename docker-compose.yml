services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: nextread-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextread
      POSTGRES_USER: nextread
      POSTGRES_PASSWORD: nextread
    volumes:
      - nextread-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextread -d nextread"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - nextread-net
    # ports:
    #   - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextread-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://nextread:nextread@db:5432/nextread
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nextread-net
    # ports:
    #   - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextread-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - nextread-net

networks:
  nextread-net:
    driver: bridge

volumes:
  nextread-db-data:
