services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: bookmatcher-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookmatcher
      POSTGRES_USER: bookmatcher
      POSTGRES_PASSWORD: bookmatcher
    volumes:
      - bookmatcher-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookmatcher -d bookmatcher"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - bookmatcher-net
    # ports:
    #   - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookmatcher-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bookmatcher:bookmatcher@db:5432/bookmatcher
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookmatcher-net
    # ports:
    #   - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookmatcher-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - bookmatcher-net

networks:
  bookmatcher-net:
    driver: bridge

volumes:
  bookmatcher-db-data:
