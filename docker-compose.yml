services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: bookrecsys-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookrecsys
      POSTGRES_USER: bookrecsys
      POSTGRES_PASSWORD: bookrecsys
    volumes:
      - bookrecsys-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookrecsys -d bookrecsys"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - bookrecsys-net
    # ports:
    #   - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookrecsys-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bookrecsys:bookrecsys@db:5432/bookrecsys
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookrecsys-net
    # ports:
    #   - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookrecsys-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - bookrecsys-net

networks:
  bookrecsys-net:
    driver: bridge

volumes:
  bookrecsys-db-data:
